  <circle cx="40" cy="26" r="1.5" fill="#C7A045"/>
  <circle cx="46" cy="26" r="1.5" fill="#C7A045"/>
  <!-- Row 2 -->
  <circle cx="34" cy="32" r="1.5" fill="#C7A045"/>
  <circle cx="40" cy="32" r="1.5" fill="#C7A045"/>
  <circle cx="46" cy="32" r="1.5" fill="#C7A045"/>
  <!-- Row 3 -->
  <circle cx="34" cy="38" r="1.5" fill="#C7A045"/>
  <circle cx="40" cy="38" r="1.5" fill="#C7A045"/>
  <circle cx="46" cy="38" r="1.5" fill="#C7A045"/>
