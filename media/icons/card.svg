<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 48">
  <rect width="80" height="48" rx="8" fill="#1E2A4A"/>
  <!-- Magnetic stripe -->
  <rect x="0" y="14" width="80" height="8" fill="#141e38"/>
  <!-- Chip body -->
  <rect x="10" y="28" width="16" height="12" rx="2" fill="#D4A843"/>
  <!-- Chip lines -->
  <rect x="10" y="33" width="16" height="1" fill="rgba(0,0,0,0.25)"/>
  <rect x="18" y="28" width="1" height="12" fill="rgba(0,0,0,0.25)"/>
  <!-- Mastercard-style circles -->
  <circle cx="60" cy="33" r="8" fill="#EB001B" opacity="0.88"/>
  <circle cx="70" cy="33" r="8" fill="#F79E1B" opacity="0.88"/>
</svg>
